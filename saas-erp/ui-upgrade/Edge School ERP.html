<!-- Data + atoms -->

<!-- Main App -->
<script type="text/babel">

const PAGE_LABELS = {
  dashboard:'Dashboard', students:'Students', 'students-add':'Register Student',
  attendance:'Mark Attendance', 'att-daily':'Attendance Report',
  fees:'Fee Invoices', 'fee-criteria':'Fee Criteria', 'fee-discounts':'Discounts',
  expenses:'Add Expense', 'exp-heads':'Expense Heads', 'exp-ledger':'Ledger',
  payroll:'Payroll', result:'Results', accounting:'Accounting',
  library:'Library', staff:'Staff Directory', classes:'Classes & Subjects',
  timetable:'Timetable', parents:'Parents', ai:'AI Assistant',
  reports:'Reports & Analytics', 'rep-financial':'Financial Report',
  'rep-attendance':'Attendance Report', 'rep-fees':'Fee Collection Report',
  settings:'Settings', complaints:'Complaints', leave:'Leave Requests',
};

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryColor": "#4f46e5",
  "fontScale": 1,
  "density": "comfortable",
  "sidebarWidth": 220
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = React.useState('dashboard');
  const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply primary color as CSS var
  React.useEffect(() => {
    if (tweaks?.primaryColor) {
      document.documentElement.style.setProperty('--primary', tweaks.primaryColor);
    }
  }, [tweaks?.primaryColor]);

  const renderPage = () => {
    switch(page) {
      case 'dashboard':    return <DashboardPage setPage={setPage} />;
      case 'students':        return <StudentsPage setPage={setPage} />;
      case 'attendance':      return <AttendancePage />;
      case 'expenses':        return <ExpensesPage />;
      case 'fees':            return <FeeInvoicesPage />;
      case 'reports':
      case 'rep-financial':
      case 'rep-attendance':
      case 'rep-fees':
        return <ReportingPage initialTab={
          page==='rep-financial'  ? 'financial'  :
          page==='rep-attendance' ? 'attendance' :
          page==='rep-fees'       ? 'fees'       : 'summary'
        } />;
      default:                return <PlaceholderPage title={PAGE_LABELS[page] || page} />;
    }
  };

  const isCompact = tweaks.density === 'compact';
  const mainPad = isCompact ? '16px 20px' : '24px 28px';

  return (
    <div style={{ display:'flex', height:'100vh', overflow:'hidden' }}>
      {/* Sidebar */}
      <Sidebar
        activePage={page}
        setPage={setPage}
        collapsed={sidebarCollapsed}
        setCollapsed={setSidebarCollapsed}
      />

      {/* Main */}
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
        <Topbar activePage={page} setPage={setPage} />

        {/* Page content */}
        <main style={{
          flex:1, overflowY:'auto', overflowX:'hidden',
          padding: mainPad,
          background:'#f8fafc',
          fontSize: `${tweaks.fontScale}em`,
        }}>
          {renderPage()}
        </main>
      </div>

      {/* Tweaks Panel */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Accent Color">
          <TweakColor id="primaryColor" label="Primary" />
        </TweakSection>
        <TweakSection label="Density">
          <TweakRadio id="density" options={['comfortable','compact']} />
        </TweakSection>
        <TweakSection label="Text Scale">
          <TweakSlider id="fontScale" min={0.85} max={1.15} step={0.05} label="Scale" />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
